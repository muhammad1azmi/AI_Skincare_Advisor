name: Build & Distribute APK

on:
  push:
    branches: [main]
    paths:
      - 'frontend/flutter_app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Set up signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > frontend/flutter_app/android/app/release.keystore
            echo "✅ Using release keystore from secrets"
          else
            echo "⚠️ No KEYSTORE_BASE64 secret found, using debug keystore"
            cp ~/.android/debug.keystore frontend/flutter_app/android/app/release.keystore 2>/dev/null || \
            keytool -genkey -v -keystore frontend/flutter_app/android/app/release.keystore \
              -alias release -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=AI Skincare Advisor, OU=Dev, O=Skincare, L=Jakarta, ST=DKI, C=ID" \
              -storepass android -keypass android
          fi

          # Print SHA-1 for Firebase registration
          echo ""
          echo "========================================="
          echo "🔑 SHA-1 Fingerprint (add to Firebase):"
          keytool -list -v -keystore frontend/flutter_app/android/app/release.keystore \
            -alias release -storepass "${KEYSTORE_PASSWORD:-android}" -keypass "${KEY_PASSWORD:-android}" 2>/dev/null | grep SHA1 || \
          keytool -list -v -keystore frontend/flutter_app/android/app/release.keystore \
            -storepass "${KEYSTORE_PASSWORD:-android}" 2>/dev/null | grep SHA1
          echo "========================================="
          echo ""

          # Create key.properties for Gradle (in android/app/ where build.gradle.kts lives)
          cat > frontend/flutter_app/android/app/key.properties <<EOF
storePassword=${KEYSTORE_PASSWORD:-android}
keyPassword=${KEY_PASSWORD:-android}
keyAlias=release
storeFile=release.keystore
EOF

      - name: Install dependencies
        working-directory: frontend/flutter_app
        run: flutter pub get

      - name: Analyze
        working-directory: frontend/flutter_app
        run: flutter analyze --no-pub --no-fatal-infos --no-fatal-warnings

      - name: Build APK
        working-directory: frontend/flutter_app
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: frontend/flutter_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Distribute to Firebase App Distribution
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          npm install -g firebase-tools
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json
          firebase appdistribution:distribute \
            frontend/flutter_app/build/app/outputs/flutter-apk/app-release.apk \
            --app "$FIREBASE_APP_ID" \
            --groups "internal-testers" \
            --release-notes "Build ${{ github.run_number }} — Model Armor, ADK streaming, Firebase Auth"
          rm /tmp/sa-key.json
