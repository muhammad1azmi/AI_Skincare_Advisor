steps:
  # Step 1: Build Flutter APK
  - name: 'ghcr.io/cirruslabs/flutter:stable'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        # Diagnostic: verify AndroidManifest.xml is uploaded
        echo "=== Checking AndroidManifest.xml ==="
        cat frontend/flutter_app/android/app/src/main/AndroidManifest.xml
        echo "=== File listing ==="
        find frontend/flutter_app/android -name "*.xml" -o -name "*.kts" -o -name "*.gradle" | head -20

        cd frontend/flutter_app

        # Generate local.properties
        FPATH=$$(dirname $$(dirname $$(which flutter)))
        echo "flutter.sdk=$$FPATH" > android/local.properties
        if [ -n "$$ANDROID_HOME" ]; then
          echo "sdk.dir=$$ANDROID_HOME" >> android/local.properties
        elif [ -n "$$ANDROID_SDK_ROOT" ]; then
          echo "sdk.dir=$$ANDROID_SDK_ROOT" >> android/local.properties
        fi

        flutter pub get
        flutter build apk --release
    id: 'build-apk'

  # Step 2: Upload APK to Firebase App Distribution
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g firebase-tools
        firebase appdistribution:distribute \
          frontend/flutter_app/build/app/outputs/flutter-apk/app-release.apk \
          --app 1:1089521368524:android:7af3d00fc3c9164eaf7169 \
          --groups "internal-testers" \
          --release-notes "AI Skincare Advisor v1.0 — ADK streaming, Firebase Auth, push notifications"
    id: 'distribute-apk'
    waitFor: ['build-apk']

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
